<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UXly Inspector</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <header>
    <div class="brand">
      <div class="brand-mark">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <rect x="1" y="1" width="18" height="18" rx="4" stroke="currentColor" stroke-width="1.5"/>
          <path d="M6 10L9 13L14 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <h1>UXly</h1>
        <p class="subtitle">UI Consistency Inspector</p>
      </div>
    </div>
  </header>

  <div class="controls">
    <button id="btn-analyze" class="btn-primary">
      <svg class="btn-icon" width="14" height="14" viewBox="0 0 14 14" fill="none">
        <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M9.5 9.5L13 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Analyze Page
    </button>
    <button id="btn-export" class="btn-ghost" disabled title="Export JSON">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 2v7M4 6l3 3 3-3M2 11v1h10v-1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button id="btn-clear" class="btn-ghost" disabled title="Clear results">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M3 3l8 8M11 3l-8 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <nav class="tabs">
    <button class="tab active" data-tab="findings">Findings</button>

    <button class="tab" data-tab="consistency">Data</button>
    <button class="tab" data-tab="components">Components</button>
    <button class="tab" data-tab="json">JSON</button>
  </nav>

  <div id="status" class="status"></div>

  <main>
    <section id="tab-findings" class="tab-content active">
      <div id="findings-content">
        <div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect x="6" y="6" width="36" height="36" rx="8" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
            <rect x="12" y="12" width="24" height="24" rx="4" stroke="currentColor" stroke-width="1.5" opacity="0.15"/>
            <path d="M20 24L23 27L28 21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>
          </svg>
          <p>Analyze a page to inspect its UI consistency</p>
        </div>
      </div>
    </section>



    <section id="tab-consistency" class="tab-content">
      <div id="consistency-content"><div class="empty-state"><p>No data yet</p></div></div>
    </section>

    <section id="tab-components" class="tab-content">
      <div id="components-content"><div class="empty-state"><p>No data yet</p></div></div>
    </section>

    <section id="tab-json" class="tab-content">
      <pre id="json-content" class="json-output">No data yet.</pre>
    </section>
  </main>

  <script src="sidepanel.js"></script>
</body>
</html>
